services:
  # Interactive Brokers Client Portal Gateway
  # This runs the IB gateway that handles the actual authentication with IB servers.
  # You must supply your IB credentials via the TWS_USERID / TWS_PASSWORD env vars.
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    environment:
      TWS_USERID: ${IB_USERNAME}
      TWS_PASSWORD: ${IB_PASSWORD}
      TRADING_MODE: ${IB_TRADING_MODE:-paper}
      READ_ONLY_API: "no"
      VNC_SERVER_PASSWORD: ""
    ports:
      - "5000:5000"   # REST API
      - "5900:5900"   # VNC (optional, for debugging)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sk", "https://localhost:5000/v1/api/one/user"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # MCP Interactive Brokers server
  mcp-server:
    build: .
    environment:
      IB_GATEWAY_URL: https://ib-gateway:5000
      IB_GATEWAY_TLS_REJECT_UNAUTHORIZED: "false"
    depends_on:
      ib-gateway:
        condition: service_healthy
    stdin_open: true
    restart: unless-stopped
